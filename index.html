<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>ZAMBAK Association</title>

<link href="https://fonts.googleapis.com/css2?family=Aladin&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

:root{
  --pink:#e8dede;
  --pink-soft:#f6efef;

  --green:#0b5c53;
  --green-dark:#003f38;

  --overlay:rgba(7,22,20,0.68);

  --text:#f7f7f7;
  --muted:#d7d7d7;
}

html{scroll-behavior:smooth;}

body{
  margin:0;
  font-family:'Open Sans', sans-serif;
  background:
    linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
    url("https://domenico88-droid.github.io/bkdzambak.org/hero2.jpg");
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  color:var(--text);
}

.overlay{
  background:var(--overlay);
  min-height:100vh;
}

/* HEADER */
.topbar{
  position:sticky;
  top:0;
  z-index:999;
  background:rgba(0,63,56,0.58);
  backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.top-inner{
  max-width:1200px;
  margin:auto;
  padding:16px 24px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.brand{display:flex;align-items:center;gap:14px;}

.logo{
  width:62px;height:62px;border-radius:50%;
  object-fit:cover;
  border:2px solid var(--pink);
}

.brand-text h1{
  margin:0;
  font-family:'Aladin', cursive;
  font-size:44px;
  color:#fff;
}

.brand-text p{
  margin:0;
  font-size:14px;
  color:var(--muted);
}

.lang-btn{
  border:1px solid var(--pink);
  background:transparent;
  color:white;
  padding:10px 14px;
  border-radius:999px;
  cursor:pointer;
}

.menu{
  display:flex;
  justify-content:center;
  gap:28px;
  padding:18px 20px;
}

.menu a{
  color:#f5f5f5;
  text-decoration:none;
  text-transform:uppercase;
}

.menu a:hover{color:var(--pink);}

/* CONTENT */
.container{
  max-width:900px;
  margin:auto;
  padding:60px 24px 120px;
}

.hero-intro{
  padding:90px 0 80px;
}

.hero-intro h2{
  font-size:54px;
  margin-bottom:20px;
  text-shadow:0 4px 18px rgba(0,0,0,0.35);
}

.hero-intro p{
  color:var(--muted);
  line-height:1.9;
}

.section-card{
  background:rgba(232,222,222,0.08);
  border:1px solid rgba(232,222,222,0.16);
  border-radius:24px;
  padding:38px;
  margin-bottom:28px;
  backdrop-filter:blur(8px);
  box-shadow:0 10px 40px rgba(0,0,0,0.18);
}

.section-card:hover{
  transform:translateY(-3px);
}

.floating-cta{
  position:fixed;
  bottom:24px;
  right:24px;
}

.floating-cta a{
  background:linear-gradient(135deg,var(--pink),var(--green));
  color:#222;
  padding:16px 24px;
  border-radius:999px;
  font-weight:700;
}

/* FOOTER */
footer{
  background:#003f38;
  padding:50px 24px;
}

.socials{
  display:flex;
  gap:16px;
  margin-bottom:24px;
}

.socials a{
  width:44px;height:44px;
  border-radius:50%;
  background:rgba(255,255,255,0.12);
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
}

.bank{
  color:#ebebeb;
  font-size:13px;
  line-height:1.8;
}

</style>
</head>

<body>

<div class="overlay">

<header class="topbar">
<div class="top-inner">

<div class="brand">
<img class="logo" src="https://domenico88-droid.github.io/bkdzambak.org/logo.jpg">
<div class="brand-text">
<h1>ZAMBAK</h1>
<p id="subtitle"></p>
</div>
</div>

<button class="lang-btn" onclick="switchLang()">EN / TR / BS</button>

</div>

<nav class="menu">
<a href="#about" id="menuAbout"></a>
<a href="#join" id="menuJoin"></a>
<a href="#activities" id="menuActivities"></a>
<a href="#contact" id="menuContact"></a>
</nav>
</header>

<main class="container">

<section class="hero-intro">
<h2 id="heroTitle"></h2>
<p id="heroText"></p>
</section>

<section id="about" class="section-card">
<h3 id="aboutTitle"></h3>
<p id="aboutText"></p>
</section>

<section id="join" class="section-card">
<h3 id="joinTitle"></h3>
<p id="joinText"></p>
</section>

<section id="activities" class="section-card">
<h3 id="activitiesTitle"></h3>
<p id="activitiesText"></p>
</section>

<section id="contact" class="section-card">
<h3 id="contactTitle"></h3>
<p id="contactText"></p>
</section>

</main>

<footer>
<div class="socials">
<a href="https://instagram.com/zambak.bkd"><i class="fab fa-instagram"></i></a>
<a href="https://www.youtube.com/@zambak2591"><i class="fab fa-youtube"></i></a>
</div>

<div class="bank">
Zambak Association<br>
IBAN: TR970001500158007318656732
</div>
</footer>

</div>

<script>

let lang="en";

const content={

en:{
subtitle:"Bosniak Women Association",
menuAbout:"About us",
menuJoin:"Join us",
menuActivities:"Activities",
menuContact:"Contact",
heroTitle:"Women, culture and identity brought together.",
heroText:"Zambak is a Bosniak women’s association focused on culture, solidarity and community.",
aboutTitle:"About us",
aboutText:"Zambak connects women through shared identity and cultural values.",
joinTitle:"Join us",
joinText:"Become part of our community.",
activitiesTitle:"Activities",
activitiesText:`Organizing social gatherings, cultural events, education and empowerment programs.`,
contactTitle:"Contact",
contactText:"Contact us for collaborations."
},

tr:{
subtitle:"Boşnak Kadınlar Derneği",
menuAbout:"Hakkımızda",
menuJoin:"Bize Katılın",
menuActivities:"Faaliyetler",
menuContact:"İletişim",
heroTitle:"Kadınları, kültürü ve kimliği bir araya getiriyoruz.",
heroText:"Zambak kültür ve dayanışma derneğidir.",
aboutTitle:"Hakkımızda",
aboutText:"Zambak kadınları bir araya getirir.",
joinTitle:"Bize Katılın",
joinText:"Topluluğumuza katılın.",
activitiesTitle:"Faaliyetler",
activitiesText:"Sosyal ve kültürel faaliyetler.",
contactTitle:"İletişim",
contactText:"Bizimle iletişime geçin."
},

bs:{
subtitle:"Udruženje žena Zambak",
menuAbout:"O nama",
menuJoin:"Pridruži se",
menuActivities:"Aktivnosti",
menuContact:"Kontakt",
heroTitle:"Žene, kultura i identitet.",
heroText:"Zambak okuplja žene.",
aboutTitle:"O nama",
aboutText:"Zambak povezuje žene.",
joinTitle:"Pridruži se",
joinText:"Postani dio zajednice.",
activitiesTitle:"Aktivnosti",
activitiesText:`- Druženja
- Edukacije
- Putovanja
- Osnaživanje žena
- Jezik i kultura`,
contactTitle:"Kontakt",
contactText:"Kontaktirajte nas."
}

};

function render(){

document.getElementById("subtitle").innerText=content[lang].subtitle;

["menuAbout","menuJoin","menuActivities","menuContact"].forEach(id=>{
document.getElementById(id).innerText=content[lang][id];
});

document.getElementById("heroTitle").innerText=content[lang].heroTitle;
document.getElementById("heroText").innerText=content[lang].heroText;

document.getElementById("aboutTitle").innerText=content[lang].aboutTitle;
document.getElementById("aboutText").innerHTML=content[lang].aboutText;

document.getElementById("joinTitle").innerText=content[lang].joinTitle;
document.getElementById("joinText").innerHTML=content[lang].joinText;

document.getElementById("activitiesTitle").innerText=content[lang].activitiesTitle;
document.getElementById("activitiesText").innerHTML=content[lang].activitiesText;

document.getElementById("contactTitle").innerText=content[lang].contactTitle;
document.getElementById("contactText").innerHTML=content[lang].contactText;

}

function switchLang(){
lang=lang==="en"?"tr":lang==="tr"?"bs":"en";
render();
}

render();

</script>

</body>
</html>
