<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zambak Association</title>

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>
    :root {
      --pink: #f8d7e3;
      --pink-soft: #fff1f6;
      --green: #b9d8c2;
      --text: #2f2f2f;
      --muted: #666;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--pink-soft);
      color: var(--text);
    }

    .container {
      max-width: 860px;
      margin: auto;
      padding: 60px 20px;
    }

    .topbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 10px;
    }

    .lang-btn {
      border: 1px solid var(--green);
      background: white;
      padding: 8px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 14px;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--green);
      margin-bottom: 15px;
    }

    h1 {
      margin: 0;
      font-size: 40px;
    }

    .subtitle {
      color: var(--muted);
      margin-top: 8px;
      line-height: 1.5;
    }

    .card {
      background: white;
      border: 1px solid var(--green);
      border-radius: 18px;
      padding: 26px;
      margin-bottom: 18px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.04);
    }

    h2 {
      margin-top: 0;
      font-size: 18px;
    }

    p {
      color: var(--muted);
      line-height: 1.7;
    }

    .cta-wrap {
      display: flex;
      justify-content: flex-end;
      margin-top: 10px;
    }

    .button {
      background: linear-gradient(135deg, var(--pink), var(--green));
      border: none;
      padding: 12px 18px;
      border-radius: 999px;
      font-weight: bold;
      text-decoration: none;
      color: #2f2f2f;
    }

    .bank {
      background: #f9f9f9;
      border-left: 4px solid var(--green);
      padding: 14px;
      border-radius: 12px;
      font-size: 14px;
      white-space: pre-line;
    }

    .socials {
      text-align: center;
      margin-top: 35px;
    }

    .socials a {
      color: var(--muted);
      margin: 0 10px;
      font-size: 22px;
    }

    .email {
      color: var(--text);
      font-weight: bold;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="topbar">
    <button class="lang-btn" onclick="switchLang()">EN / TR / BS</button>
  </div>

  <div class="header">

    <img class="logo"
      src="https://YOUR-GITHUB-USERNAME.github.io/YOUR-REPO/logo.png"
      alt="Logo">

    <h1>Zambak</h1>

    <div class="subtitle" id="subtitle"></div>
  </div>

  <!-- ABOUT -->
  <div class="card">
    <h2 id="aboutTitle"></h2>
    <p id="aboutText"></p>
  </div>

  <!-- MEMBERSHIP -->
  <div class="card">
    <h2 id="joinTitle"></h2>
    <p id="joinText"></p>

    <div class="cta-wrap">
      <a class="button"
        href="https://docs.google.com/forms/d/e/1FAIpQLSeEeUXeQR8ubRFosRM4pdYFWVAwRiPpDk_MGUVF4lbLkR-faA/viewform"
        target="_blank"
        id="ctaBtn"></a>
    </div>
  </div>

  <!-- BANK -->
  <div class="card">
    <h2 id="bankTitle"></h2>
    <p id="bankPurpose"></p>

    <div class="bank">
Zambak Boşnak Kadınlar Derneği

Vakıf Bank, Çukurambar Şubesi

HESAP NO (TL): 00158007318656732

IBAN: TR970001500158007318656732

Açıklama: üyelik / bağış – Ad Soyad
    </div>
  </div>

  <!-- CONTACT -->
  <div class="card">
    <h2 id="contactTitle"></h2>
    <p id="contactText"></p>

    <p>
      <a class="email" href="mailto:bkd.zambak@gmail.com">
        bkd.zambak@gmail.com
      </a>
    </p>
  </div>

  <!-- SOCIAL -->
  <div class="socials">
    <a href="https://www.youtube.com/@zambak2591" target="_blank">
      <i class="fab fa-youtube"></i>
    </a>

    <a href="https://instagram.com/zambak.bkd" target="_blank">
      <i class="fab fa-instagram"></i>
    </a>
  </div>

</div>

<script>
let lang = "en";

const content = {
  en: {
    subtitle: "Bosniak Women Association Zambak<br>Women • Culture • Community",

    aboutTitle: "Welcome",
    aboutText:
      `"Zambak" is a platform that brings women and their families together around shared values and identity. By activating knowledge and quality, we aim to enrich society and contribute through socio-cultural engagement.`,

    joinTitle: "Membership",
    joinText: "You can apply for membership using the form below.",
    ctaBtn: "Apply Now",

    bankTitle: "Bank Information",
    bankPurpose: "Membership fees or donations can be made to the account below.",

    contactTitle: "Contact",
    contactText: "We are open to collaboration, cultural projects and partnerships. Feel free to reach out."
  },

  tr: {
    subtitle: "Boşnak Kadınlar Derneği Zambak<br>Kadın • Kültür • Dayanışma",

    aboutTitle: "Hoş Geldiniz",
    aboutText:
      `"Zambak" kadınları ve ailelerini ortak değerler ve kimlik etrafında bir araya getiren bir platformdur. Bilgi ve birikimi hayata geçirerek topluma katkı sağlamayı ve sosyo-kültürel alanda değer üretmeyi amaçlar.`,

    joinTitle: "Üyelik",
    joinText: "Aşağıdaki formu doldurarak üyelik başvurusu yapabilirsiniz.",
    ctaBtn: "Başvuru Yap",

    bankTitle: "Banka Bilgileri",
    bankPurpose: "Üyelik aidatı veya bağışlar aşağıdaki hesaba yapılabilir.",

    contactTitle: "İletişim",
    contactText: "İş birliği, kültürel projeler ve ortaklıklar için bizimle iletişime geçebilirsiniz."
  },

  bs: {
    subtitle: "Udruženje žena Zambak<br>Kultura • Zajedništvo • Žene",

    aboutTitle: "Dobrodošli",
    aboutText:
      `"Zambak" je platforma koja okuplja žene i njihove porodice oko zajedničkih vrijednosti i identiteta. Stavljajući u pogon svoje znanje i kvalitet, želimo obogatiti tursko društvo i dati svoj doprinos kroz sociokulturni angažman.`,

    joinTitle: "Članstvo",
    joinText: "Možete se prijaviti putem obrasca ispod.",
    ctaBtn: "Prijava",

    bankTitle: "Bankovni Podaci",
    bankPurpose: "Članarina ili donacije mogu se uplatiti na račun ispod.",

    contactTitle: "Kontakt",
    contactText: "Otvoreni smo za saradnju, kulturne projekte i partnerstva. Slobodno nam se obratite."
  }
};

function render() {
  document.getElementById("subtitle").innerHTML = content[lang].subtitle;

  document.getElementById("aboutTitle").innerText = content[lang].aboutTitle;
  document.getElementById("aboutText").innerText = content[lang].aboutText;

  document.getElementById("joinTitle").innerText = content[lang].joinTitle;
  document.getElementById("joinText").innerText = content[lang].joinText;
  document.getElementById("ctaBtn").innerText = content[lang].ctaBtn;

  document.getElementById("bankTitle").innerText = content[lang].bankTitle;
  document.getElementById("bankPurpose").innerText = content[lang].bankPurpose;

  document.getElementById("contactTitle").innerText = content[lang].contactTitle;
  document.getElementById("contactText").innerText = content[lang].contactText;
}

function switchLang() {
  lang = lang === "en" ? "tr" : lang === "tr" ? "bs" : "en";
  render();
}

render();
</script>

</body>
</html>
