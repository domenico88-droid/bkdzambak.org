<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ZAMBAK Association</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>
:root{
  --pink:#f8d7e3;
  --pink-soft:#fff1f6;
  --green:#b9d8c2;
  --text:#2f2f2f;
  --muted:#666;
}

body{
  margin:0;
  font-family: Arial, sans-serif;
  background: var(--pink-soft);
  color:var(--text);
}

/* TOP BAR */
.topbar{
  position:fixed;
  top:15px;
  right:15px;
  z-index:10;
}

.lang-btn{
  border:1px solid var(--green);
  background:white;
  padding:8px 14px;
  border-radius:999px;
  cursor:pointer;
}

/* HERO LAYOUT */
.hero{
  display:flex;
  min-height:100vh;
}

/* LEFT IMAGE */
.hero-left{
  flex:1;
  background:#eee;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

.hero-left img{
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0.95;
}

/* RIGHT CONTENT */
.hero-right{
  flex:1;
  overflow-y:auto;
  padding:60px 40px;
}

/* HEADER */
.logo{
  width:80px;
  height:80px;
  border-radius:50%;
  border:2px solid var(--green);
  margin-bottom:10px;
}

h1{
  margin:0;
  font-size:40px;
}

.subtitle{
  color:var(--muted);
  margin-bottom:30px;
}

/* CARDS */
.card{
  background:white;
  border:1px solid var(--green);
  border-radius:16px;
  padding:22px;
  margin-bottom:16px;
}

h2{margin-top:0;}

p{color:var(--muted); line-height:1.7;}

/* CTA */
.cta-wrap{
  display:flex;
  justify-content:flex-end;
  <div class="cta-wrap">
  <a class="button"
     href="https://docs.google.com/forms/d/e/1FAIpQLSeEeUXeQR8ubRFosRM4pdYFWVAwRiPpDk_MGUVF4lbLkR-faA/viewform"
     target="_blank"
     id="ctaBtn">
  </a>
</div>
}

.button{
  background:linear-gradient(135deg,var(--pink),var(--green));
  padding:12px 18px;
  border-radius:999px;
  text-decoration:none;
  color:#2f2f2f;
  font-weight:bold;
}
  

/* BANK */
.bank{
  background:#f9f9f9;
  border-left:4px solid var(--green);
  padding:14px;
  border-radius:12px;
  white-space:pre-line;
  font-size:14px;
}

/* ANIMATION */
.card{
  animation:fade 0.6s ease;
}

@keyframes fade{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

/* RESPONSIVE */
@media(max-width:900px){
  .hero{flex-direction:column;}
  .hero-left{height:300px;}
}
  /* SOCIALS */
.socials{
  display:flex;
  gap:18px;
  margin-top:10px;
}

.socials a{
  width:46px;
  height:46px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:white;
  border:1px solid var(--green);
  color:var(--text);
  text-decoration:none;
  transition:0.25s ease;
}

.socials a:hover{
  transform:translateY(-2px);
  background:var(--pink);
}
</style>
</head>

<body>

<div class="topbar">
<button class="lang-btn" onclick="switchLang()">EN / TR / BS</button>
</div>

<div class="hero">

<!-- LEFT HERO IMAGE -->
<div class="hero-left">
  <img src="https://domenico88-droid.github.io/bkdzambak.org/hero2.jpg"
  alt="Zambak Bosniak Women Association">
</div>

<!-- RIGHT CONTENT -->
<div class="hero-right">

  <img class="logo"
  src="https://domenico88-droid.github.io/bkdzambak.org/logo.jpg"
  alt="logo">

  <h1>ZAMBAK</h1>
  <div class="subtitle" id="subtitle"></div>

  <div class="card">
    <h2 id="aboutTitle"></h2>
    <p id="aboutText"></p>
  </div>

  <div class="card">
    <h2 id="joinTitle"></h2>
    <p id="joinText"></p>

    <div class="cta-wrap">
      <a class="button" href="https://docs.google.com/forms/d/e/1FAIpQLSeEeUXeQR8ubRFosRM4pdYFWVAwRiPpDk_MGUVF4lbLkR-faA/viewform" id="ctaBtn"></a>
    </div>
  </div>

  <div class="card">
    <h2 id="bankTitle"></h2>
    <p id="bankPurpose"></p>

    <div class="bank">
Zambak Boşnak Kadınlar Derneği

Vakıf Bank, Çukurambar Şubesi

HESAP NO (TL): 00158007318656732

IBAN: TR970001500158007318656732

Açıklama: üyelik / bağış – Ad Soyad
    </div>
  </div>

  <div class="card">
    <h2 id="contactTitle"></h2>
    <p id="contactText"></p>
    <p>bkd.zambak@gmail.com</p>
  </div>

<!-- SOCIALS -->
<div class="card">
  <h2>Social</h2>

  <div class="socials">

    <a href="https://www.instagram.com/zambak.bkd/"
       target="_blank"
       aria-label="Instagram">
      <i class="fab fa-instagram"></i>
    </a>

    <a href="https://www.youtube.com/@zambak2591"
       target="_blank"
       aria-label="YouTube">
      <i class="fab fa-youtube"></i>
    </a>

  </div>
</div>
  
</div>
</div>

<script>
let lang="en";

const content={
en:{
subtitle:"Bosniak Women Association Zambak",
aboutTitle:"Welcome",
aboutText:`"Zambak" is a platform that brings Bosniak women together around shared values and preserving identity. 
By employing knowledge and quality, we aim to enrich society through socio-cultural engagement.`,
joinTitle:"Membership",
joinText:"Become a member of Zambak! Apply using the form below.",
ctaBtn:"Apply Now",
bankTitle:"Bank Information",
bankPurpose:"Membership fee or donations can be made below.",
contactTitle:"Contact",
contactText:"We are open to collaboration and cultural partnerships."
},

tr:{
subtitle:"Boşnak Kadınlar Derneği Zambak",
aboutTitle:"Hoş Geldiniz",
aboutText:`"Zambak" kadınları ve ailelerini ortak değerler etrafında birleştirir.`,
joinTitle:"Üyelik",
joinText:"Formu doldurarak başvuru yapabilirsiniz.",
ctaBtn:"Başvuru Yap",
bankTitle:"Banka Bilgileri",
bankPurpose:"Üyelik veya bağış yapılabilir.",
contactTitle:"İletişim",
contactText:"İş birlikleri için iletişime geçebilirsiniz."
},

bs:{
subtitle:"Udruženje žena Zambak",
aboutTitle:"Dobrodošli",
aboutText:`"Zambak" okuplja žene porijeklom iz Bosne i Hercegovine, Sandžaka i regije oko zajedničkih vrijednosti i očuvanja identiteta.`,
joinTitle:"Članstvo",
joinText:"Postanite članica Zambaka! Prijavite se putem obrasca.",
ctaBtn:"Prijavi se",
bankTitle:"Bankovni Podaci",
bankPurpose:"Članarina ili donacije.",
contactTitle:"Kontakt",
contactText:"Otvoreni smo za saradnju."
}
};

function render(){
document.getElementById("subtitle").innerText=content[lang].subtitle;
document.getElementById("aboutTitle").innerText=content[lang].aboutTitle;
document.getElementById("aboutText").innerText=content[lang].aboutText;
document.getElementById("joinTitle").innerText=content[lang].joinTitle;
document.getElementById("joinText").innerText=content[lang].joinText;
document.getElementById("ctaBtn").innerText=content[lang].ctaBtn;
document.getElementById("bankTitle").innerText=content[lang].bankTitle;
document.getElementById("bankPurpose").innerText=content[lang].bankPurpose;
document.getElementById("contactTitle").innerText=content[lang].contactTitle;
document.getElementById("contactText").innerText=content[lang].contactText;
}

function switchLang(){
lang = lang==="en"?"tr":lang==="tr"?"bs":"en";
render();
}

render();
</script>

</body>
</html>
